<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LEXOR Interpreter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-editor: #1c2128;
            --bg-console: #1c2128;
            --border: #30363d;
            --border-panel: #444c56;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --error: #f85149;
            --success: #3fb950;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        .navbar-lexor {
            background-color: var(--bg-card) !important;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
        }
        .navbar-lexor .container-fluid {
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }
        .editor-wrapper {
            height: 380px;
            border: 1px solid var(--border-panel);
            border-radius: 10px;
            overflow: hidden;
            background: var(--bg-editor);
        }
        #lexor-editor {
            width: 100%;
            height: 100%;
        }
        .console-box {
            background: var(--bg-console);
            border: 1px solid var(--border-panel);
            border-radius: 10px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            min-height: 180px;
            max-height: 280px;
            overflow-y: auto;
            padding: 1.25rem 1.5rem;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .console-box .output-line {
            color: var(--text);
        }
        .console-box .error-line {
            color: var(--error);
            font-weight: 500;
        }
        .btn-run {
            background: var(--success);
            border: none;
            color: #0d1117;
            font-weight: 600;
        }
        .btn-run:hover {
            background: #2ea043;
            color: #0d1117;
        }
        .form-select-lexor {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            max-width: 280px;
        }
        .form-select-lexor:focus {
            background: var(--bg-card);
            border-color: var(--accent);
            color: var(--text);
        }
        .card-lexor {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .card-lexor .card-body {
            padding: 1.25rem 1.5rem;
        }
        .console-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .main-toolbar {
            padding: 0.5rem 0 1rem;
            margin-bottom: 0.5rem;
        }
        .main-content {
            padding: 1.5rem 1.25rem 2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-lexor">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-code-slash me-2"></i>LEXOR Interpreter
            </span>
        </div>
    </nav>

    <main class="container-fluid main-content">
        <div class="row main-toolbar align-items-center flex-wrap gap-3">
            <div class="col-auto">
                <label class="form-label text-body-secondary mb-0 me-2">Sample Programs</label>
                <select id="sample-programs" class="form-select form-select-sm form-select-lexor" aria-label="Sample programs">
                    <option value="">-- Choose a sample --</option>
                    <option value="hello">Hello World</option>
                    <option value="vars">Variables</option>
                    <option value="loop">Simple Loop</option>
                    <option value="empty">Empty / Clear</option>
                </select>
            </div>
            <div class="col-auto ms-md-auto">
                <button type="button" id="run-btn" class="btn btn-run btn-sm px-4 py-2">
                    <i class="bi bi-play-fill me-1"></i> Run
                </button>
            </div>
        </div>

        <div class="card card-lexor mb-4">
            <div class="card-body p-3 p-md-4">
                <div class="editor-wrapper">
                    <div id="lexor-editor"></div>
                </div>
            </div>
        </div>

        <div class="card card-lexor">
            <div class="card-body p-3 p-md-4">
                <div class="console-label mb-3">Output</div>
                <div id="console" class="console-box" role="log" aria-live="polite"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        const SAMPLES = {
            hello: 'PRINT "Hello from LEXOR!"\n',
            vars: 'LET x = 10\nLET y = 20\nPRINT x + y\n',
            loop: 'FOR i = 1 TO 5\n  PRINT i\nNEXT i\n',
            empty: ''
        };

        const sampleSelect = document.getElementById('sample-programs');
        const runBtn = document.getElementById('run-btn');
        const consoleEl = document.getElementById('console');
        let editor = null;

        function appendToConsole(text, isError) {
            const line = document.createElement('div');
            line.className = isError ? 'error-line' : 'output-line';
            line.textContent = text || '(no output)';
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function clearConsole() {
            consoleEl.innerHTML = '';
        }

        sampleSelect.addEventListener('change', function () {
            const key = this.value;
            if (!key) return;
            const code = SAMPLES[key];
            if (editor) editor.setValue(code || '');
        });

        runBtn.addEventListener('click', async function () {
            const code = editor ? editor.getValue() : '';
            clearConsole();
            runBtn.disabled = true;
            runBtn.querySelector('i').className = 'bi bi-hourglass-split me-1';

            try {
                const res = await fetch('/api/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: code
                });
                const data = await res.json();

                if (data.error) {
                    appendToConsole(data.error, true);
                } else {
                    if (data.output) appendToConsole(data.output, false);
                }
            } catch (err) {
                appendToConsole('Error: ' + err.message, true);
            } finally {
                runBtn.disabled = false;
                runBtn.querySelector('i').className = 'bi bi-play-fill me-1';
            }
        });

        require.config({
            paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }
        });
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('lexor-editor'), {
                value: 'PRINT "Hello from LEXOR!"\n',
                language: 'plaintext',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                padding: { top: 12 }
            });
        });
    </script>
</body>
</html>
